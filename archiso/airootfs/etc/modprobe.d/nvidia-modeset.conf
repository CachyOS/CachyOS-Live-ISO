# nvidia-module-loader loads nvidia-drm with modprobe, not via the kernel command
# line, so KMS modesetting and the DRM framebuffer must be set here as module
# options rather than nvidia-drm.modeset=1 / nvidia-drm.fbdev=1 on the cmdline.
# Without modeset=1 the GOP-to-KMS handoff never happens and Turing+ cards
# black-screen; fbdev=1 gives nvidia-drm the framebuffer console after handoff.
options nvidia_drm modeset=1 fbdev=1
