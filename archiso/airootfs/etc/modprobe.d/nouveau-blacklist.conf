# Prevent udev from autoloading nouveau by PCI modalias during coldplug, so it
# cannot bind the NVIDIA GPU before nvidia-module-loader decides which driver
# this hardware should use. This is an AUTOLOAD blacklist only: nvidia-module-
# loader still explicitly `modprobe nouveau` for Maxwell/Pascal cards (where
# chwd reports "nouveau"), and a blacklist directive never blocks an explicit
# modprobe. Baked into the live initramfs by the modconf hook, so nouveau cannot
# bind even in early userspace before the root pivot.
blacklist nouveau
